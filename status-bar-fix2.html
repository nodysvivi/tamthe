<!doctype html>
<html lang="vi-VN" data-theme="night">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="app-version" content="1.1.0">
  <title>Thiết bị quan sát Khu rừng đen</title>
  <style>
:root {
  color-scheme: dark;
  --void-rgb: 5, 10, 16;
  --abyss-rgb: 8, 16, 24;
  --surface-rgb: 14, 28, 38;
  --surface-hover-rgb: 18, 36, 47;
  --accent-rgb: 126, 193, 201;
  --muted-rgb: 116, 143, 149;
  --danger-rgb: 214, 88, 76;
  --amber-rgb: 198, 153, 82;
  --cyan-rgb: 84, 160, 171;
  --star-rgb: 205, 238, 241;
  --void: rgb(var(--void-rgb));
  --abyss: rgb(var(--abyss-rgb));
  --glass: rgba(var(--surface-rgb), 0.9);
  --glass-soft: rgba(var(--surface-rgb), 0.72);
  --line: rgba(var(--accent-rgb), 0.2);
  --line-strong: rgba(var(--accent-rgb), 0.42);
  --phosphor: #b2d2d6;
  --phosphor-hot: #eff9fa;
  --muted: #8da5aa;
  --dim: #657d82;
  --text-soft: #a4bdc1;
  --text-faint: #849da2;
  --red: #d6584c;
  --red-hot: #f08778;
  --amber: #c69952;
  --cyan: #62a7b2;
  --ink: #0a151d;
  --shadow-outer: rgba(0, 0, 0, 0.5);
  --shadow-inner: rgba(0, 0, 0, 0.34);
  --edge-highlight: rgba(226, 248, 250, 0.07);
  --scan-blend: screen;
  --font-scale: 1;
  --serif: "Noto Serif SC", "Source Han Serif SC", "Songti SC", STSong, Georgia, serif;
  --sans: "Noto Sans SC", "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
  --mono: "IBM Plex Mono", "JetBrains Mono", "Cascadia Mono", Consolas, monospace;
}

:root[data-theme="day"] {
  color-scheme: light;
  --void-rgb: 244, 247, 245;
  --abyss-rgb: 255, 255, 255;
  --surface-rgb: 250, 252, 250;
  --surface-hover-rgb: 255, 255, 255;
  --accent-rgb: 54, 111, 118;
  --muted-rgb: 95, 119, 123;
  --danger-rgb: 176, 65, 56;
  --amber-rgb: 145, 101, 44;
  --cyan-rgb: 47, 116, 128;
  --star-rgb: 58, 104, 110;
  --line: rgba(var(--accent-rgb), 0.2);
  --line-strong: rgba(var(--accent-rgb), 0.38);
  --phosphor: #385459;
  --phosphor-hot: #182f34;
  --muted: #536d72;
  --dim: #75878a;
  --text-soft: #425c61;
  --text-faint: #60787c;
  --red: #b04138;
  --red-hot: #8f302a;
  --amber: #91652c;
  --cyan: #2f7480;
  --ink: #f4f7f5;
  --shadow-outer: rgba(37, 56, 59, 0.16);
  --shadow-inner: rgba(37, 56, 59, 0.08);
  --edge-highlight: rgba(255, 255, 255, 0.82);
  --scan-blend: multiply;
}

:root[data-theme="tea"] {
  color-scheme: light;
  --void-rgb: 232, 223, 204;
  --abyss-rgb: 247, 241, 228;
  --surface-rgb: 240, 231, 213;
  --surface-hover-rgb: 251, 246, 235;
  --accent-rgb: 119, 91, 57;
  --muted-rgb: 127, 108, 87;
  --danger-rgb: 151, 67, 57;
  --amber-rgb: 145, 99, 47;
  --cyan-rgb: 72, 113, 112;
  --star-rgb: 112, 86, 55;
  --line: rgba(var(--accent-rgb), 0.2);
  --line-strong: rgba(var(--accent-rgb), 0.4);
  --phosphor: #5c4c3e;
  --phosphor-hot: #2f2720;
  --muted: #756452;
  --dim: #92816f;
  --text-soft: #665546;
  --text-faint: #7f6d5d;
  --red: #974339;
  --red-hot: #7d332d;
  --amber: #91632f;
  --cyan: #487170;
  --ink: #f3ebdc;
  --shadow-outer: rgba(73, 54, 34, 0.18);
  --shadow-inner: rgba(73, 54, 34, 0.1);
  --edge-highlight: rgba(255, 252, 243, 0.78);
  --scan-blend: multiply;
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  background: transparent;
  color: var(--phosphor);
  font-family: var(--sans);
  font-size: calc(14px * var(--font-scale));
}

button,
input {
  font: inherit;
}

button {
  color: inherit;
}

.tb-frame {
  position: relative;
  width: min(100%, 1120px);
  margin: 0 auto;
  overflow: hidden;
  isolation: isolate;
  border: 1px solid var(--line-strong);
  border-radius: 3px;
  background:
    radial-gradient(circle at 84% 8%, rgba(var(--accent-rgb), 0.12), transparent 24%),
    radial-gradient(circle at 14% 74%, rgba(var(--danger-rgb), 0.09), transparent 28%),
    linear-gradient(145deg, rgba(var(--void-rgb), 0.98), rgba(var(--surface-rgb), 0.98) 52%, rgba(var(--void-rgb), 0.99));
  box-shadow:
    0 18px 60px var(--shadow-outer),
    inset 0 0 70px var(--shadow-inner),
    inset 0 1px 0 var(--edge-highlight);
}

.tb-frame::before,
.tb-frame::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  pointer-events: none;
}

.tb-frame::before {
  opacity: 0.48;
  background-image:
    radial-gradient(circle at 6% 18%, rgba(var(--star-rgb), 0.75) 0 0.6px, transparent 0.9px),
    radial-gradient(circle at 18% 64%, rgba(var(--star-rgb), 0.5) 0 0.6px, transparent 1px),
    radial-gradient(circle at 41% 28%, rgba(var(--star-rgb), 0.45) 0 0.5px, transparent 0.9px),
    radial-gradient(circle at 69% 76%, rgba(var(--star-rgb), 0.55) 0 0.6px, transparent 1px),
    radial-gradient(circle at 88% 31%, rgba(var(--star-rgb), 0.7) 0 0.6px, transparent 1px),
    radial-gradient(circle at 97% 88%, rgba(var(--star-rgb), 0.42) 0 0.5px, transparent 0.9px);
  background-size: 173px 149px, 211px 191px, 257px 229px, 293px 271px, 337px 311px, 389px 347px;
}

.tb-frame::after {
  opacity: 0.16;
  background: repeating-linear-gradient(0deg, transparent 0 3px, rgba(var(--accent-rgb), 0.08) 4px);
  mix-blend-mode: var(--scan-blend);
}

.tb-scan {
  position: absolute;
  left: 0;
  right: 0;
  top: -30%;
  z-index: 20;
  height: 26%;
  pointer-events: none;
  opacity: 0.22;
  background: linear-gradient(180deg, transparent, rgba(var(--accent-rgb), 0.07), transparent);
  animation: tb-scan 9s linear infinite;
}

@keyframes tb-scan {
  to { transform: translateY(500%); }
}

.tb-header {
  position: relative;
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) minmax(250px, 0.65fr);
  gap: 22px;
  padding: 25px 28px 19px;
  border-bottom: 1px solid var(--line);
}

.tb-header::after {
  content: "";
  position: absolute;
  right: 0;
  bottom: -1px;
  width: 34%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--red));
  box-shadow: 0 0 12px rgba(var(--danger-rgb), 0.44);
}

.tb-kicker,
.tb-eyebrow {
  color: var(--muted);
  font-family: var(--mono);
  font-size: calc(9px * var(--font-scale));
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.tb-kicker {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 9px;
}

.tb-live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--phosphor);
  box-shadow: 0 0 10px var(--phosphor);
  animation: tb-pulse 2.2s ease-in-out infinite;
}

@keyframes tb-pulse {
  50% { opacity: 0.28; transform: scale(0.78); }
}

.tb-title {
  margin: 0;
  color: var(--phosphor-hot);
  font-family: var(--serif);
  font-size: clamp(25px, 4vw, 43px);
  font-weight: 500;
  letter-spacing: 0.09em;
  line-height: 1.05;
  text-shadow: 0 0 28px rgba(var(--accent-rgb), 0.14);
}

.tb-subtitle {
  margin-top: 9px;
  color: var(--dim);
  font-family: var(--mono);
  font-size: calc(10px * var(--font-scale));
  letter-spacing: 0.16em;
}

.tb-coordinate {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 18px;
  align-items: center;
}

.tb-coordinate-text {
  min-width: 0;
  text-align: right;
}

.tb-time {
  color: var(--phosphor-hot);
  font-family: var(--mono);
  font-size: calc(15px * var(--font-scale));
  font-variant-numeric: tabular-nums;
  line-height: 1.35;
}

.tb-location {
  margin-top: 5px;
  overflow: hidden;
  color: var(--muted);
  font-size: calc(11px * var(--font-scale));
  text-overflow: ellipsis;
  white-space: nowrap;
}

.tb-orbit {
  --p: 0;
  position: relative;
  display: grid;
  width: 74px;
  aspect-ratio: 1;
  place-items: center;
  border-radius: 50%;
  background: conic-gradient(var(--red) calc(var(--p) * 1%), rgba(var(--muted-rgb), 0.13) 0);
  box-shadow: 0 0 24px rgba(var(--danger-rgb), 0.12);
}

.tb-orbit::before {
  content: "";
  position: absolute;
  inset: 4px;
  border: 1px solid var(--line);
  border-radius: 50%;
  background: var(--abyss);
}

.tb-orbit-value,
.tb-orbit-label {
  position: relative;
  z-index: 1;
  font-family: var(--mono);
  font-variant-numeric: tabular-nums;
}

.tb-orbit-value {
  margin-top: 7px;
  color: var(--red-hot);
  font-size: calc(17px * var(--font-scale));
}

.tb-orbit-label {
  margin-top: -17px;
  color: var(--dim);
  font-size: calc(7px * var(--font-scale));
  letter-spacing: 0.12em;
}

.tb-tabs {
  display: flex;
  gap: 0;
  padding: 0 17px;
  overflow-x: auto;
  border-bottom: 1px solid var(--line);
  scrollbar-width: none;
}

.tb-tabs::-webkit-scrollbar {
  display: none;
}

.tb-tab {
  position: relative;
  flex: 1 0 auto;
  min-width: 100px;
  padding: 14px 12px 12px;
  border: 0;
  background: transparent;
  color: var(--dim);
  cursor: pointer;
  font-family: var(--serif);
  font-size: calc(13px * var(--font-scale));
  letter-spacing: 0.08em;
  transition: color 180ms ease, background 180ms ease;
  white-space: nowrap; /* Ngăn chữ xuống dòng gây mất chữ */
}

.tb-tab::before {
  content: attr(data-code);
  display: block;
  margin-bottom: 3px;
  font-family: var(--mono);
  font-size: calc(7px * var(--font-scale));
  letter-spacing: 0.18em;
}

.tb-tab::after {
  content: "";
  position: absolute;
  right: 20%;
  bottom: -1px;
  left: 20%;
  height: 1px;
  background: var(--phosphor);
  box-shadow: 0 0 10px var(--phosphor);
  opacity: 0;
  transform: scaleX(0.2);
  transition: opacity 180ms ease, transform 180ms ease;
}

.tb-tab:hover,
.tb-tab.active {
  color: var(--phosphor-hot);
  background: linear-gradient(180deg, transparent, rgba(var(--accent-rgb), 0.06));
}

.tb-tab.active::after {
  opacity: 1;
  transform: scaleX(1);
}

.tb-main {
  padding: 21px 22px 19px;
}

.tb-panel {
  display: none;
  animation: tb-in 260ms ease both;
}

.tb-panel.active {
  display: block;
}

@keyframes tb-in {
  from { opacity: 0; transform: translateY(4px); }
}

.tb-hero-grid,
.tb-grid-2,
.tb-grid-3,
.tb-entity-grid {
  display: grid;
  gap: 12px;
}

.tb-hero-grid {
  grid-template-columns: minmax(0, 1.08fr) minmax(270px, 0.92fr);
}

.tb-grid-2 {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.tb-grid-3 {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.tb-entity-grid {
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
}

.tb-card,
.tb-entity {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--line);
  background: linear-gradient(145deg, rgba(var(--surface-rgb), 0.72), rgba(var(--void-rgb), 0.68));
  box-shadow: inset 0 1px 0 rgba(var(--star-rgb), 0.04);
}

.tb-card::before,
.tb-entity::before {
  content: "";
  position: absolute;
  top: -1px;
  left: -1px;
  width: 31px;
  height: 9px;
  border-top: 1px solid var(--phosphor);
  border-left: 1px solid var(--phosphor);
  opacity: 0.55;
}

.tb-card {
  padding: 16px;
}

.tb-card[data-action="open-root"],
.tb-entity[data-action="open-entity"] {
  cursor: pointer;
}

.tb-card[data-action="open-root"]:hover,
.tb-entity:hover {
  border-color: var(--line-strong);
  background: linear-gradient(145deg, rgba(var(--surface-hover-rgb), 0.84), rgba(var(--abyss-rgb), 0.76));
}

.tb-card-title,
.tb-section-title,
.tb-entity-name {
  color: var(--phosphor-hot);
  font-family: var(--serif);
  font-weight: 500;
}

.tb-card-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
  font-size: calc(15px * var(--font-scale));
  letter-spacing: 0.06em;
}

.tb-card-code,
.tb-count {
  flex: 0 0 auto;
  color: var(--dim);
  font-family: var(--mono);
  font-size: calc(8px * var(--font-scale));
  letter-spacing: 0.12em;
}

.tb-section-head {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 12px;
  margin: 21px 1px 10px;
  padding-bottom: 7px;
  border-bottom: 1px solid var(--line);
}

.tb-section-title {
  font-size: calc(16px * var(--font-scale));
  letter-spacing: 0.08em;
}

.tb-section-meta {
  color: var(--dim);
  font-family: var(--mono);
  font-size: calc(8px * var(--font-scale));
  letter-spacing: 0.1em;
}

.tb-fact-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(125px, 1fr));
  gap: 7px;
}

.tb-fact {
  padding: 8px 9px;
  border-left: 1px solid rgba(var(--accent-rgb), 0.22);
  background: rgba(var(--accent-rgb), 0.045);
}

.tb-fact-label {
  margin-bottom: 4px;
  color: var(--dim);
  font-family: var(--mono);
  font-size: calc(8px * var(--font-scale));
  letter-spacing: 0.08em;
}

.tb-fact-value {
  overflow-wrap: anywhere;
  color: var(--phosphor);
  font-size: calc(12px * var(--font-scale));
  line-height: 1.5;
}

.tb-summary {
  color: var(--text-soft);
  font-family: var(--serif);
  font-size: calc(13px * var(--font-scale));
  line-height: 1.8;
}

.tb-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tb-chip,
.tb-status {
  display: inline-flex;
  align-items: center;
  max-width: 100%;
  border: 1px solid rgba(var(--accent-rgb), 0.22);
  background: rgba(var(--accent-rgb), 0.07);
  color: var(--text-soft);
  font-family: var(--mono);
  font-size: calc(9px * var(--font-scale));
  line-height: 1.25;
  letter-spacing: 0.04em;
}

.tb-chip {
  padding: 4px 7px;
}

.tb-chip.danger,
.tb-status.danger {
  border-color: rgba(var(--danger-rgb), 0.36);
  background: rgba(var(--danger-rgb), 0.09);
  color: var(--red-hot);
}

.tb-chip.amber,
.tb-status.amber {
  border-color: rgba(var(--amber-rgb), 0.32);
  background: rgba(var(--amber-rgb), 0.08);
  color: var(--amber);
}

.tb-chip.cyan,
.tb-status.cyan {
  border-color: rgba(var(--cyan-rgb), 0.32);
  background: rgba(var(--cyan-rgb), 0.08);
  color: var(--cyan);
}

.tb-status {
  flex: 0 0 auto;
  padding: 3px 6px;
  white-space: nowrap;
}

.tb-bars {
  display: grid;
  gap: 10px;
}

.tb-bar-row {
  display: grid;
  gap: 5px;
}

.tb-bar-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: calc(9px * var(--font-scale));
  font-variant-numeric: tabular-nums;
}

.tb-bar {
  height: 3px;
  overflow: hidden;
  background: rgba(var(--muted-rgb), 0.14);
}

.tb-bar-fill {
  width: 0;
  height: 100%;
  background: linear-gradient(90deg, rgba(var(--accent-rgb), 0.52), var(--phosphor));
  box-shadow: 0 0 8px rgba(var(--accent-rgb), 0.42);
  transition: width 500ms ease;
}

.tb-bar-fill.warn {
  background: linear-gradient(90deg, rgba(var(--amber-rgb), 0.6), var(--amber));
  box-shadow: 0 0 8px rgba(var(--amber-rgb), 0.32);
}

.tb-bar-fill.danger {
  background: linear-gradient(90deg, rgba(var(--danger-rgb), 0.7), var(--red-hot));
  box-shadow: 0 0 8px rgba(var(--danger-rgb), 0.36);
}

.tb-radar-wrap {
  display: grid;
  grid-template-columns: minmax(180px, 0.85fr) minmax(150px, 1.15fr);
  align-items: center;
  gap: 8px;
}

.tb-radar {
  display: block;
  width: 100%;
  max-width: 230px;
  margin: 0 auto;
}

.tb-radar-block {
  display: grid;
  gap: 8px;
  justify-items: center;
}

.tb-radar-legend {
  display: grid;
  grid-template-columns: repeat(2, auto);
  justify-content: center;
  gap: 3px 14px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.03em;
  color: var(--muted);
}

.tb-radar-legend span {
  white-space: nowrap;
}

.tb-radar-legend b {
  margin-right: 5px;
  color: var(--red-hot);
  font-weight: 700;
}

.tb-radar .grid {
  fill: none;
  stroke: rgba(var(--accent-rgb), 0.17);
  stroke-width: 1;
}

.tb-radar .axis {
  stroke: rgba(var(--accent-rgb), 0.13);
  stroke-width: 1;
}

.tb-radar .shape {
  fill: rgba(var(--danger-rgb), 0.13);
  stroke: var(--red-hot);
  stroke-width: 1.2;
  filter: drop-shadow(0 0 5px rgba(var(--danger-rgb), 0.35));
}

.tb-radar text {
  fill: var(--muted);
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.06em;
}

.tb-alert-list,
.tb-plain-list {
  display: grid;
  gap: 7px;
  margin: 0;
  padding: 0;
  list-style: none;
}

.tb-alert-list li,
.tb-plain-list li {
  position: relative;
  padding-left: 14px;
  color: var(--text-faint);
  font-size: calc(11px * var(--font-scale));
  line-height: 1.55;
}

.tb-alert-list li::before,
.tb-plain-list li::before {
  content: "";
  position: absolute;
  top: 0.62em;
  left: 0;
  width: 5px;
  height: 1px;
  background: var(--red);
  box-shadow: 0 0 6px rgba(var(--danger-rgb), 0.52);
}

.tb-plain-list li::before {
  background: var(--phosphor);
  box-shadow: none;
}

.tb-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 13px;
}

.tb-search {
  min-width: 0;
  flex: 1 1 auto;
  padding: 9px 11px;
  border: 1px solid var(--line);
  border-radius: 0;
  outline: none;
  background: rgba(var(--abyss-rgb), 0.7);
  color: var(--phosphor);
  font-family: var(--mono);
  font-size: calc(10px * var(--font-scale));
}

.tb-search:focus {
  border-color: var(--line-strong);
  box-shadow: 0 0 0 1px rgba(var(--accent-rgb), 0.08);
}

.tb-filter {
  flex: 0 0 auto;
  padding: 8px 10px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-family: var(--mono);
  font-size: calc(9px * var(--font-scale));
}

.tb-filter.active,
.tb-filter:hover {
  border-color: var(--line-strong);
  background: rgba(var(--accent-rgb), 0.08);
  color: var(--phosphor-hot);
}

.tb-entity {
  min-width: 0;
  padding: 13px;
  transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
}

.tb-entity:hover {
  transform: translateY(-1px);
}

.tb-entity-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.tb-entity-name {
  min-width: 0;
  overflow: hidden;
  font-size: calc(14px * var(--font-scale));
  letter-spacing: 0.04em;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.tb-entity-id {
  margin-top: 3px;
  color: var(--dim);
  font-family: var(--mono);
  font-size: calc(8px * var(--font-scale));
}

.tb-entity-body {
  margin-top: 10px;
  color: var(--text-faint);
  font-size: calc(11px * var(--font-scale));
  line-height: 1.62;
}

.tb-entity-foot {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 11px;
}

.tb-presence {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.tb-presence::before {
  content: "";
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: currentColor;
  box-shadow: 0 0 7px currentColor;
}

.tb-chain {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: minmax(176px, 1fr);
  gap: 26px;
  padding: 3px 2px 11px;
  overflow-x: auto;
  scrollbar-color: rgba(var(--accent-rgb), 0.28) transparent;
}

.tb-chain-node {
  position: relative;
  padding: 13px;
  border: 1px solid var(--line);
  background: rgba(var(--abyss-rgb), 0.78);
  cursor: pointer;
}

.tb-chain-node:not(:last-child)::after {
  content: "";
  position: absolute;
  top: 50%;
  left: calc(100% + 1px);
  width: 26px;
  height: 1px;
  background: linear-gradient(90deg, var(--red), rgba(var(--danger-rgb), 0.12));
}

.tb-chain-node:not(:last-child)::before {
  content: "";
  position: absolute;
  z-index: 1;
  top: calc(50% - 2px);
  left: calc(100% + 21px);
  width: 4px;
  height: 4px;
  border-top: 1px solid var(--red);
  border-right: 1px solid var(--red);
  transform: rotate(45deg);
}

.tb-chain-type {
  color: var(--red-hot);
  font-family: var(--mono);
  font-size: calc(8px * var(--font-scale));
  letter-spacing: 0.08em;
}

.tb-chain-title {
  margin-top: 6px;
  color: var(--phosphor-hot);
  font-family: var(--serif);
  font-size: calc(13px * var(--font-scale));
  line-height: 1.45;
}

.tb-chain-meta {
  margin-top: 8px;
  color: var(--dim);
  font-family: var(--mono);
  font-size: calc(8px * var(--font-scale));
}

.tb-empty,
.tb-loading {
  display: grid;
  padding: 34px 18px;
  place-items: center;
  border: 1px dashed var(--line);
  color: var(--dim);
  text-align: center;
  font-family: var(--mono);
  font-size: calc(10px * var(--font-scale));
  letter-spacing: 0.08em;
}

.tb-loading-mark {
  width: 34px;
  aspect-ratio: 1;
  margin-bottom: 11px;
  border: 1px solid var(--line);
  border-top-color: var(--phosphor);
  border-radius: 50%;
  animation: tb-spin 1.5s linear infinite;
}

@keyframes tb-spin {
  to { transform: rotate(360deg); }
}

.tb-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 22px;
  border-top: 1px solid var(--line);
  background: rgba(var(--abyss-rgb), 0.62);
  color: var(--dim);
  font-family: var(--mono);
  font-size: calc(8px * var(--font-scale));
  letter-spacing: 0.08em;
}

.tb-footer-left {
  flex: 1 1 auto;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.tb-footer-tools,
.tb-theme-switch {
  display: flex;
  flex: 0 0 auto;
  align-items: center;
}

.tb-footer-tools {
  gap: 8px;
}

.tb-theme-switch {
  gap: 2px;
  padding: 2px;
  border: 1px solid var(--line);
  background: rgba(var(--abyss-rgb), 0.42);
}

.tb-theme-option {
  display: grid;
  width: 25px;
  height: 21px;
  padding: 0;
  place-items: center;
  border: 0;
  background: transparent;
  color: var(--dim);
  cursor: pointer;
  font-family: var(--serif);
  font-size: calc(10px * var(--font-scale));
  line-height: 1;
}

.tb-theme-option:hover {
  color: var(--phosphor-hot);
}

.tb-theme-option.active {
  background: rgba(var(--accent-rgb), 0.12);
  color: var(--phosphor-hot);
  box-shadow: inset 0 -1px 0 var(--phosphor);
}

.tb-refresh {
  flex: 0 0 auto;
  padding: 4px 7px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-family: var(--mono);
  font-size: calc(8px * var(--font-scale));
}

.tb-refresh:hover {
  border-color: var(--line-strong);
  color: var(--phosphor-hot);
}

.tb-modal {
  position: absolute;
  inset: 0;
  z-index: 300;
  display: none;
  flex-direction: column;
  background:
    radial-gradient(circle at 80% 10%, rgba(var(--accent-rgb), 0.12), transparent 28%),
    rgba(var(--void-rgb), 0.985);
}

.tb-modal.active {
  display: flex;
}

.tb-modal-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  padding: 20px 22px 14px;
  border-bottom: 1px solid var(--line);
}

.tb-modal-title {
  margin: 3px 0 0;
  color: var(--phosphor-hot);
  font-family: var(--serif);
  font-size: calc(22px * var(--font-scale));
  font-weight: 500;
  letter-spacing: 0.07em;
}

.tb-modal-close {
  flex: 0 0 auto;
  width: 34px;
  aspect-ratio: 1;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-family: var(--mono);
}

.tb-modal-close:hover {
  border-color: rgba(var(--danger-rgb), 0.42);
  color: var(--red-hot);
}

.tb-modal-body {
  flex: 1 1 auto;
  max-height: 720px;
  padding: 18px 22px 28px;
  overflow-y: auto;
  scrollbar-color: rgba(var(--accent-rgb), 0.28) transparent;
}

.tb-detail-group {
  margin-bottom: 11px;
  border: 1px solid var(--line);
  background: rgba(var(--surface-rgb), 0.5);
}

.tb-detail-group > summary {
  padding: 11px 13px;
  color: var(--phosphor-hot);
  cursor: pointer;
  font-family: var(--serif);
  font-size: calc(13px * var(--font-scale));
  letter-spacing: 0.05em;
}

.tb-detail-content {
  padding: 0 13px 13px;
}

.tb-detail-row {
  display: grid;
  grid-template-columns: minmax(92px, 0.3fr) minmax(0, 0.7fr);
  gap: 13px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(var(--accent-rgb), 0.1);
}

.tb-detail-row:last-child {
  border-bottom: 0;
}

.tb-detail-key {
  color: var(--dim);
  font-family: var(--mono);
  font-size: calc(9px * var(--font-scale));
}

.tb-detail-value {
  min-width: 0;
  overflow-wrap: anywhere;
  color: var(--text-soft);
  font-size: calc(11px * var(--font-scale));
  line-height: 1.65;
}

.tb-relation-strip {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
  gap: 10px;
  align-items: center;
  padding: 11px;
  border: 1px solid var(--line);
  background: rgba(var(--surface-rgb), 0.48);
}

.tb-relation-side {
  min-width: 0;
}

.tb-relation-side:last-child {
  text-align: right;
}

.tb-relation-arrow {
  color: var(--red);
  font-family: var(--mono);
}

.tb-error {
  border-color: rgba(var(--danger-rgb), 0.36);
  color: var(--red-hot);
}

@media (max-width: 760px) {
  .tb-header {
    grid-template-columns: 1fr;
    gap: 16px;
    padding: 21px 18px 16px;
  }

  .tb-coordinate {
    grid-template-columns: minmax(0, 1fr) auto;
  }

  .tb-coordinate-text {
    text-align: left;
  }

  .tb-orbit {
    width: 62px;
  }

  .tb-main {
    padding: 16px 14px;
  }

  .tb-hero-grid,
  .tb-grid-2,
  .tb-grid-3 {
    grid-template-columns: 1fr;
  }

  .tb-tab {
    min-width: 90px;
  }

  .tb-radar-wrap {
    grid-template-columns: minmax(150px, 0.8fr) minmax(130px, 1.2fr);
  }

  .tb-footer {
    padding: 9px 14px;
  }

  .tb-footer-tools {
    gap: 6px;
  }
}

@media (max-width: 520px) {
  html,
  body {
    font-size: calc(13px * var(--font-scale));
  }

  .tb-title {
    font-size: 27px;
  }

  .tb-subtitle {
    letter-spacing: 0.08em;
  }

  .tb-toolbar {
    flex-wrap: wrap;
  }

  .tb-search {
    flex-basis: 100%;
  }

  .tb-radar-wrap {
    grid-template-columns: 1fr;
  }

  .tb-radar {
    max-width: 200px;
  }

  .tb-entity-grid {
    grid-template-columns: 1fr;
  }

  .tb-modal-head,
  .tb-modal-body {
    padding-right: 14px;
    padding-left: 14px;
  }

  .tb-detail-row {
    grid-template-columns: 1fr;
    gap: 4px;
  }

  .tb-relation-strip {
    grid-template-columns: 1fr;
  }

  .tb-relation-side:last-child {
    text-align: left;
  }

  .tb-relation-arrow {
    transform: rotate(90deg);
  }
}@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    scroll-behavior: auto !important;
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

</head>
<body>
  <div class="tb-frame" id="tb-frame">
    <div class="tb-scan"></div>
    <header class="tb-header">
      <div>
        <div class="tb-kicker"><span class="tb-live-dot"></span><span id="tb-source">MVU SIGNAL · ACQUIRING</span></div>
        <h1 class="tb-title">Thiết bị quan sát Khu rừng Đen</h1>
        <div class="tb-subtitle">RED COAST DEEP-SPACE ARRAY / TRISOLARIS OBSERVATORY</div>
      </div>
      <div class="tb-coordinate">
        <div class="tb-coordinate-text">
          <div class="tb-time" id="tb-time">Thời gian chưa rõ</div>
          <div class="tb-location" id="tb-location">Tọa độ chưa khóa</div>
        </div>
        <div class="tb-orbit" id="tb-orbit" style="--p:0">
          <span class="tb-orbit-value" id="tb-deviation">—</span>
          <span class="tb-orbit-label">Độ lệch</span>
        </div>
      </div>
    </header>

    <nav class="tb-tabs" aria-label="Mục thanh trạng thái">
      <button class="tb-tab active" type="button" data-tab="observation" data-code="01 / SIGNAL">Đài quan sát</button>
      <button class="tb-tab" type="button" data-tab="protagonist" data-code="02 / SUBJECT">Nhân vật chính</button>
      <button class="tb-tab" type="button" data-tab="people" data-code="03 / PERSONAE">Nhân vật</button>
      <button class="tb-tab" type="button" data-tab="civilization" data-code="04 / DOMAIN">Tình hình văn minh</button>
      <button class="tb-tab" type="button" data-tab="causality" data-code="05 / CASCADE">Chuỗi nhân quả</button>
      <button class="tb-tab" type="button" data-tab="records" data-code="06 / ARCHIVE">Ghi chép</button>
    </nav>

    <main class="tb-main">
      <section class="tb-panel active" id="tb-panel-observation"><div class="tb-loading"><div class="tb-loading-mark"></div>Đang tìm kiếm tín hiệu biến số</div></section>
      <section class="tb-panel" id="tb-panel-protagonist"></section>
      <section class="tb-panel" id="tb-panel-people"></section>
      <section class="tb-panel" id="tb-panel-civilization"></section>
      <section class="tb-panel" id="tb-panel-causality"></section>
      <section class="tb-panel" id="tb-panel-records"></section>
    </main>

    <footer class="tb-footer">
      <div class="tb-footer-left" id="tb-footer-status">Đang chờ MVU khởi tạo</div>
      <div class="tb-footer-tools">
        <div class="tb-theme-switch" role="group" aria-label="Màu sắc thiết bị">
          <button class="tb-theme-option active" type="button" data-action="set-theme" data-theme-choice="night" aria-label="Chế độ ban đêm" aria-pressed="true" title="Chế độ ban đêm">Đêm</button>
          <button class="tb-theme-option" type="button" data-action="set-theme" data-theme-choice="day" aria-label="Chế độ ban ngày" aria-pressed="false" title="Chế độ ban ngày">Ngày</button>
          <button class="tb-theme-option" type="button" data-action="set-theme" data-theme-choice="tea" aria-label="Chế độ màu trà" aria-pressed="false" title="Chế độ màu trà">Trà</button>
        </div>
        <button class="tb-refresh" type="button" data-action="refresh">Lấy mẫu lại</button>
      </div>
    </footer>

    <div class="tb-modal" id="tb-modal" aria-hidden="true">
      <div class="tb-modal-head">
        <div>
          <div class="tb-eyebrow" id="tb-modal-code">ARCHIVE DETAIL</div>
          <h2 class="tb-modal-title" id="tb-modal-title">Chi tiết hồ sơ</h2>
        </div>
        <button class="tb-modal-close" type="button" data-action="close-modal" aria-label="Đóng">×</button>
      </div>
      <div class="tb-modal-body" id="tb-modal-body"></div>
    </div>
  </div>

  <script>
window.ThreeBodyStatusbar = (() => {
  const state = {
    data: {},
    tab: "observation",
    npcFilter: "Tất cả",
    npcSearch: "",
    domainFilter: "Tất cả",
    refreshing: false,
    uidMap: new Map(),
    entityIndex: new Map(),
    preview: false,
    cleanup: [],
    timers: [],
  };

  const DICTIONARIES = [
    "Nhân vật", "Mối quan hệ", "Tổ chức", "Văn minh", "Công nghệ", "Dự án", "Tài sản quan trọng", "Tình báo", "Giao tiếp", "Sự kiện nguyên tác", "Nhiệm vụ", "Lời hứa", "Tóm tắt ký ức",
  ];

  const $id = id => document.getElementById(id);

  const esc = value => String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");

  const asObject = value => value && typeof value === "object" && !Array.isArray(value) ? value : {};
  const asArray = value => Array.isArray(value) ? value : value == null || value === "" ? [] : [value];
  const entries = value => Object.entries(asObject(value));
  const valueAt = (source, path, fallback = "") => {
    const result = String(path).split(".").reduce((current, key) => current == null ? undefined : current[key], source);
    return result === undefined || result === null || result === "" ? fallback : result;
  };

  const isBlank = value => {
    if (value === undefined || value === null || value === "") return true;
    if (Array.isArray(value)) return value.length === 0;
    if (typeof value === "object") return Object.keys(value).length === 0;
    return false;
  };

  const numeric = value => {
    if (value === null || value === undefined || value === "") return null;
    const number = Number(value);
    return Number.isFinite(number) ? Math.max(0, Math.min(100, number)) : null;
  };

  const compact = (value, limit = 82) => {
    const text = safeDisplay(value);
    return text.length > limit ? `${text.slice(0, limit - 1)}…` : text;
  };

  const safeDisplay = (value, depth = 0) => {
    if (value === null || value === undefined || value === "") return "Chưa ghi chép";
    if (typeof value === "string" || typeof value === "number" || typeof value === "boolean") return String(value);
    if (depth >= 3) return "Ghi chép phức tạp";
    if (Array.isArray(value)) return value.length ? value.map(item => safeDisplay(item, depth + 1)).join("、") : "Không";
    const object = asObject(value);
    const named = object['Tên'] || object['Họ tên'] || object['Tiêu đề'] || object['Tóm tắt'] || object['Mô tả'];
    if (named) return safeDisplay(named, depth + 1);
    const pairs = Object.entries(object).slice(0, 5).map(([key, item]) => `${key}: ${safeDisplay(item, depth + 1)}`);
    return pairs.length ? pairs.join("；") : "Không";
  };

  const tone = value => {
    const text = String(value ?? "");
    if (/Tử vong|Sắp chết|Thù địch|Thất bại|Vô hiệu|Tiêu hủy|Hủy bỏ|Tuyệt mật|Không thể đảo ngược|Trọng đại|Mới tinh|Rủi ro cao|Bị chặn|Đã vi phạm/.test(text)) return "danger";
    if (/Bị cản trở|Chờ đợi|Trì hoãn|Tiềm ẩn|Chưa rõ|Bị hạn chế|Mất tích|Tạm dừng|Chuẩn bị|Chờ xác minh|Có thể/.test(text)) return "amber";
    if (/Từ xa|Truyền tải|Công nghệ|Thực nghiệm|Nguyên mẫu|Đang tiến hành|Đã nhận|Xác suất cao/.test(text)) return "cyan";
    return "";
  };

  const status = value => `<span class="tb-status ${tone(value)}" title="${esc(safeDisplay(value))}">${esc(compact(value, 42))}</span>`;
  const chip = (value, kind = "") => `<span class="tb-chip ${kind || tone(value)}" title="${esc(safeDisplay(value))}">${esc(compact(value, 34))}</span>`;
  const chips = (values, emptyText = "Không có ghi chép") => {
    const list = asArray(values).filter(item => !isBlank(item));
    return list.length ? `<div class="tb-chips">${list.map(item => chip(item)).join("")}</div>` : `<span class="tb-count">${esc(emptyText)}</span>`;
  };

  const list = (values, alert = false, emptyText = "Tạm thời không có ghi chép") => {
    const rows = asArray(values).filter(item => !isBlank(item));
    if (!rows.length) return empty(emptyText);
    return `<ul class="${alert ? "tb-alert-list" : "tb-plain-list"}">${rows.map(item => `<li>${esc(resolveUIDs(safeDisplay(item)))}</li>`).join("")}</ul>`;
  };

  const empty = message => `<div class="tb-empty">${esc(message)}</div>`;
  const sectionHead = (title, meta = "") => `<div class="tb-section-head"><div class="tb-section-title">${esc(title)}</div><div class="tb-section-meta">${esc(meta)}</div></div>`;
  const cardTitle = (title, code = "") => `<div class="tb-card-title"><span>${esc(title)}</span><span class="tb-card-code">${esc(code)}</span></div>`;
  const fact = (label, value) => `<div class="tb-fact"><div class="tb-fact-label">${esc(label)}</div><div class="tb-fact-value">${esc(resolveUIDs(safeDisplay(value)))}</div></div>`;
  const factGrid = rows => `<div class="tb-fact-grid">${rows.filter(([, value]) => !isBlank(value)).map(([label, value]) => fact(label, value)).join("") || fact("Ghi chép", "Chưa thiết lập")}</div>`;

  const bar = (label, value, invert = false) => {
    const number = numeric(value);
    const shown = number === null ? "—" : `${Math.round(number)}%`;
    const danger = number !== null && (invert ? number < 35 : number >= 70);
    const warn = number !== null && !danger && (invert ? number < 60 : number >= 40);
    return `<div class="tb-bar-row"><div class="tb-bar-head"><span>${esc(label)}</span><span>${shown}</span></div><div class="tb-bar"><div class="tb-bar-fill ${danger ? "danger" : warn ? "warn" : ""}" style="width:${number ?? 0}%"></div></div></div>`;
  };

  const locationText = location => {
    const object = asObject(location);
    const order = ["Hệ sao", "Thiên thể", "Quốc gia hoặc chính thể", "Khu vực", "Cơ sở hoặc vật mang", "Địa điểm cụ thể"];
    const values = order.map(key => object[key]).filter(value => !isBlank(value));
    return values.length ? values.join(" · ") : "Tọa độ chưa khóa";
  };

  const relationRefs = relation => [valueAt(relation, "A.UID", ""), valueAt(relation, "B.UID", "")].filter(Boolean);

  const rebuildIndexes = data => {
    state.uidMap.clear();
    state.entityIndex.clear();
    const protagonistName = valueAt(data, "Nhân vật chính.Thân phận.Họ tên", "Nhân vật chính");
    state.uidMap.set("Nhân vật chính", protagonistName);
    state.entityIndex.set("ROOT:Nhân vật chính", { kind: "Nhân vật chính", uid: "Nhân vật chính", value: asObject(data['Nhân vật chính']) });
    state.entityIndex.set("ROOT:Tuyến thế giới", { kind: "Tuyến thế giới", uid: "Tuyến thế giới", value: asObject(data['Tuyến thế giới']) });
    state.entityIndex.set("ROOT:Không thời gian", { kind: "Không thời gian", uid: "Không thời gian", value: asObject(data['Không thời gian']) });
    state.entityIndex.set("ROOT:Bối cảnh", { kind: "Bối cảnh", uid: "Bối cảnh", value: asObject(data['Bối cảnh']) });

    DICTIONARIES.forEach(kind => {
      entries(data[kind]).forEach(([uid, value]) => {
        const object = asObject(value);
        const name = object['Tên'] || object['Họ tên'] || object['Tiêu đề'] || object['Nội dung'] || uid;
        state.uidMap.set(uid, String(name));
        state.entityIndex.set(`${kind}:${uid}`, { kind, uid, value: object });
      });
    });

    entries(valueAt(data, "Nhân quả.Nút", {})).forEach(([uid, value]) => {
      const object = asObject(value);
      state.uidMap.set(uid, object['Tiêu đề'] || uid);
      state.entityIndex.set(`Nút nhân quả:${uid}`, { kind: "Nút nhân quả", uid, value: object });
    });
    entries(valueAt(data, "Nhân quả.Cạnh", {})).forEach(([uid, value]) => state.entityIndex.set(`Cạnh nhân quả:${uid}`, { kind: "Cạnh nhân quả", uid, value: asObject(value) }));
    entries(valueAt(data, "Nhân quả.Hiệu ứng trì hoãn", {})).forEach(([uid, value]) => {
      const object = asObject(value);
      state.uidMap.set(uid, object['Tên'] || uid);
      state.entityIndex.set(`Hiệu ứng trì hoãn:${uid}`, { kind: "Hiệu ứng trì hoãn", uid, value: object });
    });

    "Tóm tắt ký ức": {
      memory_001: { "Thời kỳ": "Từ khi đến cho đến khi đếm ngược xuất hiện", "Tóm tắt": "Nhân vật chính dùng ba năm để thiết lập danh tính bản địa, và tham gia vào dự án vật liệu nano; cho đến khi đếm ngược xuất hiện, ký ức nguyên tác mới từ kiến thức xa xôi biến thành mối đe dọa thực tế.", "Sự thật có hiệu lực dài hạn": ["Nhân vật chính là người xuyên không", "Nhân vật chính biết quy luật Rừng tối nhưng chưa tiết lộ"], "Thay đổi then chốt": ["Trí Tử bắt đầu trực tiếp chú ý đến nhân vật chính"], "UID liên kết": ["cause_001", "tech_001"], "Tầm quan trọng": 94 },
    },
  });
})(window.ThreeBodyStatusbar);

((TB) => {
  const { state, $id, esc, rebuildIndexes, updateHeader, updateFooter } = TB;
  const THEME_STORAGE_KEY = "three_body_statusbar_theme_v1";
  const THEMES = new Set(["night", "day", "tea"]);

  const getThemeStores = () => {
    const stores = [];
    try {
      if (window.parent?.localStorage) stores.push(window.parent.localStorage);
    } catch {}
    try {
      if (window.localStorage && !stores.includes(window.localStorage)) stores.push(window.localStorage);
    } catch {}
    return stores;
  };

  const readTheme = () => {
    for (const store of getThemeStores()) {
      try {
        const value = store.getItem(THEME_STORAGE_KEY);
        if (THEMES.has(value)) return value;
      } catch {}
    }
    return "night";
  };

  const applyTheme = (theme, persist = false) => {
    const next = THEMES.has(theme) ? theme : "night";
    document.documentElement.dataset.theme = next;
    document.querySelectorAll("[data-theme-choice]").forEach(button => {
      const active = button.dataset.themeChoice === next;
      button.classList.toggle("active", active);
      button.setAttribute("aria-pressed", active ? "true" : "false");
    });
    if (persist) {
      getThemeStores().forEach(store => {
        try { store.setItem(THEME_STORAGE_KEY, next); } catch {}
      });
    }
  };

  const showFailure = message => {
    const panel = $id(`tb-panel-${state.tab}`) || $id("tb-panel-observation");
    panel.innerHTML = `<div class="tb-empty tb-error">${esc(message)}</div>`;
    $id("tb-source").textContent = "MVU SIGNAL · UNAVAILABLE";
    $id("tb-footer-status").textContent = "Không đọc được stat_data · Có thể thêm ?preview=1 vào cuối địa chỉ để kiểm tra giao diện";
  };

  const renderAll = data => {
    state.data = data;
    rebuildIndexes(data);
    updateHeader(data);
    TB.renderObservation(data);
    TB.renderProtagonist(data);
    TB.renderPeople(data);
    TB.renderCivilization(data);
    TB.renderCausality(data);
    TB.renderRecords(data);
    updateFooter(data);
  };

  const readWithRetry = async () => {
    for (let attempt = 0; attempt < 12; attempt += 1) {
      const data = await TB.readGameData();
      if (data && Object.keys(data).length) return data;
      await new Promise(resolve => setTimeout(resolve, 180));
    }
    return null;
  };

  const refresh = async () => {
    if (state.refreshing) return;
    state.refreshing = true;
    $id("tb-footer-status").textContent = "Đang lấy mẫu lại tín hiệu MVU";
    try {
      const data = await readWithRetry();
      if (!data) {
        showFailure("Không thể đọc biến MVU. Vui lòng xác nhận stat_data tồn tại trong tầng hiện tại hoặc biến trò chuyện, và đã bật trợ lý quán rượu cùng MVU.\nGiao diện xem trước có thể thêm ?preview=1 vào cuối địa chỉ thanh trạng thái.");
        return;
      }
      renderAll(data);
    } catch (error) {
      showFailure(`Kết xuất thanh trạng thái thất bại: ${error?.message || "Lỗi không xác định"}`);
    } finally {
      state.refreshing = false;
    }
  };

  const setTab = tab => {
    if (!$id(`tb-panel-${tab}`)) return;
    state.tab = tab;
    document.querySelectorAll(".tb-tab").forEach(button => button.classList.toggle("active", button.dataset.tab === tab));
    document.querySelectorAll(".tb-panel").forEach(panel => panel.classList.toggle("active", panel.id === `tb-panel-${tab}`));
    TB.closeModal();
  };

  const handleClick = event => {
    const tab = event.target.closest("[data-tab]");
    if (tab) {
      setTab(tab.dataset.tab);
      return;
    }
    const target = event.target.closest("[data-action]");
    if (!target) return;
    const action = target.dataset.action;
    if (action === "set-theme") {
      applyTheme(target.dataset.themeChoice, true);
      return;
    }
    if (action === "refresh") refresh();
    if (action === "close-modal") TB.closeModal();
    if (action === "open-entity") TB.openEntity(target.dataset.kind, target.dataset.uid);
    if (action === "open-root") TB.openRoot(target.dataset.root);
    if (action === "npc-filter") {
      state.npcFilter = target.dataset.filter || "Tất cả";
      TB.renderPeople(state.data);
    }
    if (action === "domain-filter") {
      state.domainFilter = target.dataset.filter || "Tất cả";
      TB.renderCivilization(state.data);
    }
  };

  const debounce = (fn, delay) => {
    let timer;
    return (...args) => {
      clearTimeout(timer);
      timer = setTimeout(() => fn(...args), delay);
    };
  };

  const bindTavernEvents = () => {
    if (typeof globalThis.eventOn !== "function" || !globalThis.tavern_events) return;
    const updated = debounce(refresh, 300);
    const received = () => {
      const timer = setTimeout(refresh, 1000);
      state.timers.push(timer);
    };
    const eventPairs = [
      [globalThis.tavern_events.MESSAGE_UPDATED, updated],
      [globalThis.tavern_events.MESSAGE_EDITED, updated],
      [globalThis.tavern_events.MESSAGE_SWIPED, updated],
      [globalThis.tavern_events.MESSAGE_RECEIVED, received],
      [globalThis.tavern_events.CHAT_CHANGED, () => location.reload()],
    ].filter(([eventName]) => eventName);
    eventPairs.forEach(([eventName, handler]) => {
      try {
        const subscription = globalThis.eventOn(eventName, handler);
        if (subscription?.stop) state.cleanup.push(() => subscription.stop());
      } catch {}
    });
  };

  const destroy = () => {
    state.cleanup.splice(0).forEach(stop => {
      try { stop(); } catch {}
    });
    state.timers.splice(0).forEach(timer => clearTimeout(timer));
    clearTimeout(state.npcSearchTimer);
  };

  const init = async () => {
    applyTheme(readTheme());
    const frame = $id("tb-frame");
    frame.addEventListener("click", handleClick);
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") TB.closeModal();
    });
    bindTavernEvents();
    if (typeof globalThis.$ === "function") globalThis.$(window).on("pagehide", destroy);
    else window.addEventListener("pagehide", destroy, { once: true });
    await refresh();
  };

  const launch = () => {
    try {
      if (typeof globalThis.errorCatched === "function") globalThis.errorCatched(init)();
      else Promise.resolve(init()).catch(error => showFailure(error?.message || "Khởi tạo thất bại"));
    } catch (error) {
      showFailure(error?.message || "Khởi tạo thất bại");
    }
  };

  TB.refresh = refresh;
  if (typeof globalThis.$ === "function") globalThis.$(() => launch());
  else setTimeout(launch, 0);
})(window.ThreeBodyStatusbar);

  </script>
